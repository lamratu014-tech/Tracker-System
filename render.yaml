databases:
  - name: ops-planning-db
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: ops-planning-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PNPM_VERSION
        value: "10"
      - key: DATABASE_URL
        fromDatabase:
          name: ops-planning-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SETUP_SECRET
        generateValue: true
      - key: APP_DOMAIN
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: web
    name: ops-planning-web
    runtime: static
    plan: free
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/mobile run build:web
    staticPublishPath: artifacts/mobile/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PNPM_VERSION
        value: "10"
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false
