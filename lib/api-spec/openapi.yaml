              schema:
                type: array
                items: { $ref: "#/components/schemas/TeamNote" }
    post:
      operationId: createTeamNote
      tags: [teamNotes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTeamNoteBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamNote" }

  /team-notes/{id}:
    patch:
      operationId: updateTeamNote
      tags: [teamNotes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTeamNoteBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamNote" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteTeamNote
      tags: [teamNotes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Weekly updates ───────────────────────────────────────────────────
  /weekly-updates:
    get:
      operationId: listWeeklyUpdates
      tags: [weeklyUpdates]
      summary: List weekly updates visible to the caller (scoped by role)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WeeklyUpdate" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: submitWeeklyUpdate
      tags: [weeklyUpdates]
      summary: Submit or edit the current week's update (stream overseers only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitWeeklyUpdateBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WeeklyUpdate" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /weekly-updates/status:
    get:
      operationId: getWeeklyUpdateStatus
      tags: [weeklyUpdates]
      summary: Current-week submission status for stream overseers in scope
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WeeklyUpdateStatus" }
        "403": { $ref: "#/components/responses/Forbidden" }

# ────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    UserRole:
      type: string
      enum: [admin, programme_overseer, stream_overseer, leader, team_admin]

    TeamManagerRole:
      type: string
      enum: [leader, team_admin]

    AuthStatus:
      type: object
      required: [needsSetup]
      properties:
        needsSetup: { type: boolean }

    AuthSession:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }

    User:
      type: object
      required:
        [id, email, name, initials, department, role, active, leaderTeamIds, teamAdminTeamIds, createdAt, updatedAt]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        initials: { type: string }
        department: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        programmeId: { type: string, nullable: true }
        streamId: { type: string, nullable: true }
        leaderTeamIds:
          type: array
          items: { type: string }
          description: Teams the user leads (derived from team_managers).
        teamAdminTeamIds:
          type: array
          items: { type: string }
          description: Teams the user is a team_admin of (derived from team_managers).
        active: { type: boolean }
        invitedByName: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }

    SetupBody:
      type: object
      required: [email, name, password, setupSecret]
      properties:
        email: { type: string, format: email }
        name: { type: string, minLength: 1 }
        password: { type: string, minLength: 8 }
        department: { type: string }
        setupSecret: { type: string, minLength: 1 }

    AcceptInviteBody:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 16, maxLength: 16 }
        password: { type: string, minLength: 8 }

    ForgotPasswordBody:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    ResetPasswordBody:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 1 }
        password: { type: string, minLength: 8 }

    CreateInviteBody:
      type: object
      required: [email, name, role]
      properties:
        email: { type: string, format: email }
        name: { type: string, minLength: 1 }
        role: { $ref: "#/components/schemas/UserRole" }
        department: { type: string }
        programmeId: { type: string, nullable: true }
        streamId: { type: string, nullable: true }
        teamId:
          type: string
          nullable: true
          description: Convenience for leader invites; equivalent to teamIds of length 1.
        teamIds:
          type: array
          items: { type: string }
          description: Teams to add the invitee as a manager of (leader or team_admin role).

    CreateInviteResponse:
      type: object
      required: [message, acceptUrl, code]
      properties:
        message: { type: string }
        acceptUrl: { type: string }
        code:
          type: string
          description: 16-character invite code that the recipient enters to activate their account
          minLength: 16
          maxLength: 16

    InvitePreview:
      type: object
      required: [email, name, role, department]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        department: { type: string }

    CreateUserBody:
      type: object
      required: [email, name, password, role]
      properties:
        email: { type: string, format: email }
        name: { type: string, minLength: 1 }
        password: { type: string, minLength: 6 }
        role: { $ref: "#/components/schemas/UserRole" }
        department: { type: string }
        programmeId: { type: string, nullable: true }
        streamId: { type: string, nullable: true }
        teamId: { type: string, nullable: true }
        teamIds:
          type: array
          items: { type: string }

    UpdateUserRoleBody:
      type: object
      required: [role]
      properties:
        role: { $ref: "#/components/schemas/UserRole" }
        programmeId: { type: string, nullable: true }
        streamId: { type: string, nullable: true }
        teamId: { type: string, nullable: true }
        teamIds:
          type: array
          items: { type: string }

    Programme:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateProgrammeBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }

    UpdateProgrammeBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }

    Stream:
      type: object
      required: [id, name, description, programmeId, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        programmeId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateStreamBody:
      type: object
      required: [name, programmeId]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        programmeId: { type: string, minLength: 1 }

    UpdateStreamBody:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }

    Team:
      type: object
      required: [id, name, leaderIds, teamAdminIds, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        streamId: { type: string, nullable: true }
        leaderIds:
          type: array
          items: { type: string }
        teamAdminIds:
          type: array
          items: { type: string }
        functionLabel: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TeamWithStreamName:
      allOf:
        - $ref: "#/components/schemas/Team"
        - type: object
          properties:
            streamName: { type: string, nullable: true }

    CreateTeamBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        streamId: { type: string, nullable: true }
        leaderIds:
          type: array
          items: { type: string }
        functionLabel: { type: string }

    UpdateTeamBody:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        streamId: { type: string, nullable: true }
        functionLabel: { type: string }

    AddTeamManagerBody:
      type: object
      required: [userId, role]
      properties:
        userId: { type: string, minLength: 1 }
        role: { $ref: "#/components/schemas/TeamManagerRole" }

    Member:
      type: object
      required: [id, name, teamId, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        roleLabel: { type: string, nullable: true }
        teamId: { type: string }
        createdAt: { type: string, format: date-time }

    CreateMemberBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        roleLabel: { type: string }

    UpdateMemberBody:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        roleLabel: { type: string }
        teamId: { type: string }

    ProjectStatus:
      type: string
      enum: [not_started, in_progress, at_risk, completed]

    Project:
      type: object
      required: [id, teamId, title, description, status, color, phase, notes, tags, sharedTeamIds, createdAt, updatedAt]
      properties:
        id: { type: string }
        teamId: { type: string }
        title: { type: string }
        description: { type: string }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        color: { type: string }
        phase: { type: string }
        dueDate: { type: string, format: date-time, nullable: true }
        notes: { type: string }
        tags:
          type: array
          items: { type: string }
        sharedTeamIds:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProjectWithTeamName:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            teamName: { type: string, nullable: true }

    CreateProjectBody:
      type: object
      required: [teamId, title]
      properties:
        teamId: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        description: { type: string }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        color: { type: string }
        phase: { type: string }
        dueDate: { type: string, format: date-time, nullable: true }
        notes: { type: string }
        tags:
          type: array
          items: { type: string }
        sharedTeamIds:
          type: array
          items: { type: string }

    UpdateProjectBody:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        color: { type: string }
        phase: { type: string }
        dueDate: { type: string, format: date-time, nullable: true }
        notes: { type: string }
        tags:
          type: array
          items: { type: string }
        sharedTeamIds:
          type: array
          items: { type: string }

    Milestone:
      type: object
      required: [id, projectId, title, date, completed, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        title: { type: string }
        date: { type: string, format: date-time }
        completed: { type: boolean }
        createdAt: { type: string, format: date-time }

    CreateMilestoneBody:
      type: object
      required: [projectId, title, date]
      properties:
        projectId: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        date: { type: string, format: date-time }
        completed: { type: boolean }

    UpdateMilestoneBody:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        date: { type: string, format: date-time }
        completed: { type: boolean }

    SetMilestoneStatusBody:
      type: object
      required: [completed]
      properties:
        completed: { type: boolean }

    EventStatus:
      type: string
      enum: [pending, approved, rejected]

    EventVisibility:
      type: string
      enum: [full, shared]

    RecurrenceFreq:
      type: string
      enum: [none, daily, weekly, monthly, yearly]
      description: How often the event repeats. "none" means a one-off event.

    Event:
      type: object
      required:
        - id
        - title
        - sharedDescription
        - startDate
        - endDate
        - location
        - color
        - isAllDay
        - status
        - recurrenceFreq
        - invitedTeamIds
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        title: { type: string }
        internalDescription: { type: string, nullable: true }
        sharedDescription: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        location: { type: string }
        color: { type: string }
        isAllDay: { type: boolean }
        status: { $ref: "#/components/schemas/EventStatus" }
        recurrenceFreq: { $ref: "#/components/schemas/RecurrenceFreq" }
        recurrenceUntil:
          type: string
          format: date-time
          nullable: true
          description: Inclusive last date the series may occur on. Null means no fixed end.
        projectId: { type: string, nullable: true }
        programmeId: { type: string, nullable: true }
        createdByTeamId: { type: string, nullable: true }
        createdByUserId: { type: string, nullable: true }
        invitedTeamIds:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    EventWithVisibility:
      allOf:
        - $ref: "#/components/schemas/Event"
        - type: object
          required: [visibility]
          properties:
            visibility: { $ref: "#/components/schemas/EventVisibility" }

    CreateEventBody:
      type: object
      required: [title, startDate, endDate]
      properties:
        title: { type: string, minLength: 1 }
        internalDescription: { type: string }
        sharedDescription: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        location: { type: string }
        color: { type: string }
        isAllDay: { type: boolean }
        status: { $ref: "#/components/schemas/EventStatus" }
        recurrenceFreq: { $ref: "#/components/schemas/RecurrenceFreq" }
        recurrenceUntil: { type: string, format: date-time, nullable: true }
        projectId: { type: string, nullable: true }
        programmeId: { type: string, nullable: true }
        invitedTeamIds:
          type: array
          items: { type: string }

    UpdateEventBody:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        internalDescription: { type: string }
        sharedDescription: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        location: { type: string }
        color: { type: string }
        isAllDay: { type: boolean }
        status: { $ref: "#/components/schemas/EventStatus" }
        recurrenceFreq: { $ref: "#/components/schemas/RecurrenceFreq" }
        recurrenceUntil: { type: string, format: date-time, nullable: true }
        projectId: { type: string, nullable: true }
        programmeId: { type: string, nullable: true }
        invitedTeamIds:
          type: array
          items: { type: string }

    TeamNote:
      type: object
      required: [id, teamId, authorId, authorName, body, createdAt, updatedAt]
      properties:
        id: { type: string }
        teamId: { type: string }
        authorId: { type: string }
        authorName: { type: string, nullable: true }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateTeamNoteBody:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1 }

    UpdateTeamNoteBody:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1 }

    WeeklyUpdate:
      type: object
      required:
        [id, authorId, authorName, streamId, streamName, weekStart, body, createdAt, updatedAt]
      properties:
        id: { type: string }
        authorId: { type: string }
        authorName: { type: string, nullable: true }
        streamId: { type: string }
        streamName: { type: string, nullable: true }
        weekStart:
          type: string
          format: date
          description: Monday (YYYY-MM-DD) of the week this update covers.
        body: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SubmitWeeklyUpdateBody:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1 }

    WeeklyUpdateOverseerStatus:
      type: object
      required: [userId, name, streamId, streamName, submitted, submittedAt, updateId]
      properties:
        userId: { type: string }
        name: { type: string }
        streamId: { type: string }
        streamName: { type: string, nullable: true }
        submitted: { type: boolean }
        submittedAt: { type: string, format: date-time, nullable: true }
        updateId: { type: string, nullable: true }

    WeeklyUpdateStatus:
      type: object
      required: [weekStart, overseers]
      properties:
        weekStart:
          type: string
          format: date
          description: Monday (YYYY-MM-DD) of the current week.
        overseers:
          type: array
          items: { $ref: "#/components/schemas/WeeklyUpdateOverseerStatus" }
