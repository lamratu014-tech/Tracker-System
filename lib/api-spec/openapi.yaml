openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Ops & Planning API specification
servers:
  - url: /api
    description: Base API path

tags:
  - name: health
  - name: auth
  - name: users
  - name: invites
  - name: streams
  - name: teams
  - name: members
  - name: projects
  - name: milestones
  - name: events
  - name: teamNotes
  - name: weeklyUpdates

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ─── Auth ──────────────────────────────────────────────────────────────
  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Whether the app needs first-time setup
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthStatus" }

  /auth/setup:
    post:
      operationId: setupFirstAdmin
      tags: [auth]
      summary: Create the first admin account
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetupBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/Error" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Email + password login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Invalidate current session
      security: [{ bearerAuth: [] }]
      responses:
        "204": { description: No content }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/forgot-password:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request a password-reset link
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Complete a password reset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/accept-invite:
    post:
      operationId: acceptInvite
      tags: [auth]
      summary: Activate an invited account
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptInviteBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /auth/invite:
    post:
      operationId: createInvite
      tags: [auth, invites]
      summary: Admin or in-scope stream overseer creates an invite
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInviteBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateInviteResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /auth/invite/{token}:
    get:
      operationId: getInviteByToken
      tags: [auth, invites]
      summary: Look up an invite by its token
      parameters:
        - { in: path, name: token, required: true, schema: { type: string, minLength: 16, maxLength: 16 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InvitePreview" }
        "400": { $ref: "#/components/responses/BadRequest" }

